<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乡村老师助教系统 - 小慧老师</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="background-decoration">
            <div class="grid-pattern"></div>
            <div class="light-points"></div>
            <div class="particle-effect"></div>
        </div>
        
        <div class="main-wrapper">
            <header class="app-header">
                <div class="header-content">
                    <div class="logo-section">
                        <div class="logo-icon">
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
                                    </linearGradient>
                                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                        <feGaussianBlur stdDeviation="4" result="blur"/>
                                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                                    </filter>
                                </defs>
                                <rect x="20" y="20" width="60" height="60" rx="12" fill="url(#grad1)" filter="url(#glow)"/>
                                <path d="M35 40L65 40M35 50L60 50M35 60L55 60" stroke="white" stroke-width="3" stroke-linecap="round"/>
                                <circle cx="70" cy="30" r="4" fill="white"/>
                                <path d="M70 34V40" stroke="white" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <div class="logo-text">
                            <h1>乡村老师助教系统</h1>
                            <p>小慧老师随时为你服务！</p>
                        </div>
                    </div>
                    <div class="teacher-status-card">
                        <div class="status-avatar">
                            <div class="avatar-ring"></div>
                            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="20" cy="20" r="18" fill="url(#grad1)"/>
                                <path d="M14 16C14 14.8954 14.8954 14 16 14H24C25.1046 14 26 14.8954 26 16V18C26 19.1046 25.1046 20 24 20H16C14.8954 20 14 19.1046 14 18V16Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M16 22C16 20.8954 16.8954 20 18 20H22C23.1046 20 24 20.8954 24 22V28C24 29.1046 23.1046 30 22 30H18C16.8954 30 16 29.1046 16 28V22Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M12 18V28" stroke="white" stroke-width="2" stroke-linecap="round"/>
                                <path d="M28 18V28" stroke="white" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <div class="status-info">
                            <h3>小慧老师 · AI 智能助教</h3>
                            <p>用科技点亮乡村教育未来 ✨</p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-area">
                <div class="main-content">
                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="chat">
                            <div class="mode-icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M21 11.5C21 16.75 16.75 21 11.5 21C6.25 21 2 16.75 2 11.5C2 6.25 6.25 2 11.5 2C14.53 2 17.17 3.5 18.6 5.8L21 8.2C21.5 8.7 21.5 9.5 21 10V11.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M15 11H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M17 11V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <span class="mode-label">问答模式</span>
                            <span class="mode-desc">引导启发 · 互动问答</span>
                        </button>
                        <button class="mode-btn" data-mode="teaching">
                            <div class="mode-icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M2 3H22V21H2V3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M16 17L12 13L8 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <span class="mode-label">教学模式</span>
                            <span class="mode-desc">知识讲解 · 课堂教学</span>
                        </button>
                        <button class="mode-btn" data-mode="lesson">
                            <div class="mode-icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M16 13H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M16 17H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M10 9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <span class="mode-label">备课模式</span>
                            <span class="mode-desc">教案设计 · 资源准备</span>
                        </button>
                    </div>

                    <div class="chat-container">
                        <div class="chat-messages" id="messagesList">
                        </div>

                        <div class="input-area">
                            <button class="voice-btn" id="voiceBtn" title="语音输入">
                                <div class="voice-icon">
                                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 15C15.866 15 19 11.866 19 8C19 4.13401 15.866 1 12 1C8.13401 1 5 4.13401 5 8C5 11.866 8.13401 15 12 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M19 10V14C19 14 21 15 21 18V20C21 21.1046 20.1046 22 19 22H5C3.89543 22 3 21.1046 3 20V18C3 15 5 14 5 14V10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </div>
                                <span class="voice-text">语音输入</span>
                            </button>
                            <div class="text-input-wrapper">
                                <input type="text" id="messageInput" placeholder="输入你的问题..." />
                                <div class="input-hint">按 Enter 发送，Shift + Enter 换行</div>
                                <div class="input-glow"></div>
                            </div>
                            <button class="send-btn" id="sendBtn" title="发送">
                                <div class="send-icon">
                                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </div>
                                <span class="send-text">发送</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
